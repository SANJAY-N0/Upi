<!DOCTYPE html>
<html>
<head>
<title>UPI Payment</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
font-family: Arial;
text-align:center;
margin-top:80px;
background:#f4f4f4;
}

.container{
background:white;
padding:30px;
border-radius:10px;
width:300px;
margin:auto;
box-shadow:0 0 10px rgba(0,0,0,0.2);
}

button{
width:200px;
padding:15px;
margin:10px;
font-size:18px;
border:none;
border-radius:8px;
background:#2ecc71;
color:white;
cursor:pointer;
}

button:hover{
background:#27ae60;
}
</style>
</head>

<body>

<div class="container">

<h2>Pay via UPI</h2>
<p>Select amount</p>

<button onclick="pay(100)">Pay ₹100</button>
<button onclick="pay(70)">Pay ₹70</button>
<button onclick="pay(40)">Pay ₹40</button>

</div>

<script>
function pay(amount){
window.location.href="upi://pay?pa=9894709708@naviaxis&pn=Sanjay%20N&am="+amount+"&cu=INR";
}
</script>

</body>
</html>
